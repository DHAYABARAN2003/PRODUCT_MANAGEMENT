name: product_management_app
description: "A production-ready Flutter Product Management Application with Clean Architecture + MVVM + Riverpod."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  dio: ^5.7.0

  go_router: ^14.8.1

  shared_preferences: ^2.3.4

  connectivity_plus: ^6.1.1

  cached_network_image: ^3.4.1

  json_annotation: ^4.9.0

  carousel_slider: ^5.0.0

  shimmer: ^3.0.0

  cupertino_icons: ^1.0.8

  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  build_runner: ^2.4.14
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.5
  mocktail: ^1.0.5

flutter:
  uses-material-design: true
