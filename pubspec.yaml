name: product_management_app
description: "A production-ready Flutter Product Management Application with Clean Architecture + MVVM + Riverpod."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Networking
  dio: ^5.7.0

  # Routing
  go_router: ^14.8.1

  # Local Storage
  shared_preferences: ^2.3.4

  # Connectivity
  connectivity_plus: ^6.1.1

  # Image Caching
  cached_network_image: ^3.4.1

  # JSON Serialization
  json_annotation: ^4.9.0

  # Carousel
  carousel_slider: ^5.0.0

  # Shimmer Effect
  shimmer: ^3.0.0

  # Icons
  cupertino_icons: ^1.0.8

  # Google Fonts
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.14
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.5
  mocktail: ^1.0.5

flutter:
  uses-material-design: true
